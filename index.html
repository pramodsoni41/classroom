<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="login-card">
  <h1>Student Portal</h1>
  <p class="subtitle">Login to view notes, marks and attendance</p>

  <input type="text" id="roll" placeholder="Enter Roll Number">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="divider">OR</div>

  <button onclick="showChangePassword()" class="quiz-btn">
    Change Password
  </button>

  <p id="loginMessage"></p>
</div>

<!-- 🔹 Change Password Modal -->
<div id="changeBox" style="display:none; margin-top:20px;">
  <input type="password" id="oldPass" placeholder="Old Password">
  <input type="password" id="newPass" placeholder="New Password">

  <button onclick="changePassword()">Update Password</button>
</div>

  <script src="script.js"></script>
</body>
</html>
