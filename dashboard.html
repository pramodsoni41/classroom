<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body onload="loadDashboard()">

<header class="topbar">
  <div>
    <h2>Student Dashboard</h2>
    <p id="studentInfo">Loading student details...</p>
  </div>

<div class="header-actions">

  <button onclick="goToQuiz()" class="quiz-btn">
    Quiz
  </button>

  <button onclick="openPasswordModal()" class="change-pass-btn">
    Change Password
  </button>

  <button onclick="logout()" class="logout-btn">
    Logout
  </button>

</div>
</header>

<main class="container">

  <section class="section">
    <h3>Registered Courses</h3>
    <div id="courseTabs" class="course-tabs">
      <p>Loading courses...</p>
    </div>
  </section>

  <section class="section">
    <h3 id="selectedCourseTitle">Course Dashboard</h3>

    <div class="two-column">
      <div>
        <h3>Marks</h3>
        <div id="marks" class="card">
          <p>Loading marks...</p>
        </div>
      </div>

      <div>
        <h3>Attendance</h3>
        <div id="attendance" class="card">
          <p>Loading attendance...</p>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <h3>Class Notes</h3>
    <div id="notes" class="grid">
      <p>Loading notes...</p>
    </div>
  </section>

  <section class="section">
    <h3>Announcements</h3>
    <div id="announcements" class="grid">
      <p>Loading announcements...</p>
    </div>
  </section>

</main>

<script src="script.js"></script>

<!-- 🔐 Password Modal -->
<div id="passwordModal" class="modal">
  <div class="modal-content">

    <span class="close-btn" onclick="closePasswordModal()">&times;</span>

    <h3>Change Password</h3>

    <input type="password" id="oldPass" placeholder="Old Password">
    <input type="password" id="newPass" placeholder="New Password">
    <input type="password" id="confirmPass" placeholder="Confirm New Password">

    <button onclick="changePassword()">Update Password</button>

    <p id="passMsg"></p>

  </div>
</div>

</body>
</html>
